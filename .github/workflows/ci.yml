name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.lock.txt

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock.txt

      - name: Run tests with coverage (CI-safe)
        run: pytest -m "not timing_dependent" --cov=ratelimiter --cov-report=term-missing

      - name: Type check
        run: mypy src

  timing-dependent:
    name: Timing-dependent race tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.lock.txt

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock.txt

      - name: Run timing-dependent tests
        run: pytest -m timing_dependent
